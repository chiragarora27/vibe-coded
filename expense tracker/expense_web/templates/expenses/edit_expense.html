{% extends 'base.html' %}
{% block title %}Edit Expense{% endblock %}
{% block page_title %}Edit Expense{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-h1">Edit Expense</h1>
    <p class="page-sub">Update the details below. The original date will be preserved.</p>
  </div>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('expenses.edit', index=index) }}" class="expense-form" novalidate>

    <div class="field">
      <label for="name">Expense Name</label>
      <input type="text" id="name" name="name"
             value="{{ expense.Name }}"
             placeholder="e.g. Lunch at Olive Garden"
             autocomplete="off" required />
    </div>

    <div class="field-row">
      <div class="field">
        <label for="cost">Amount (₹)</label>
        <input type="number" id="cost" name="cost"
               value="{{ expense.Cost }}"
               placeholder="0.00" min="0" step="0.01" required />
      </div>

      <div class="field">
        <label for="category">Category</label>
        <input type="text" id="category" name="category"
               value="{{ expense.Category }}"
               list="cat-list"
               placeholder="Food, Transport, Bills…"
               autocomplete="off" required />
        <datalist id="cat-list">
          {% for cat in categories %}
          <option value="{{ cat }}">
          {% endfor %}
          <option value="Food">
          <option value="Transport">
          <option value="Utilities">
          <option value="Entertainment">
          <option value="Health">
          <option value="Shopping">
          <option value="Education">
          <option value="Other">
        </datalist>
      </div>
    </div>

    <!-- Show original date as read-only context -->
    <div class="field">
      <label>Original Date</label>
      <input type="text" value="{{ expense.Date[:10] if expense.Date else '—' }}"
             disabled class="input-disabled" />
    </div>

    <div class="form-actions">
      <a href="{{ url_for('expenses.all_expenses') }}" class="btn btn--ghost">Cancel</a>
      <button type="submit" class="btn btn--primary">Save Changes →</button>
    </div>

  </form>
</div>
{% endblock %}
