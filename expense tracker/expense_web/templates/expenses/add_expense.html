{% extends 'base.html' %}
{% block title %}Add Expense{% endblock %}
{% block page_title %}Add Expense{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-h1">Add Expense</h1>
    <p class="page-sub">Log a new transaction to your account.</p>
  </div>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('expenses.add') }}" class="expense-form" novalidate>

    <div class="field">
      <label for="name">Expense Name</label>
      <input type="text" id="name" name="name" placeholder="e.g. Lunch at Olive Garden"
             autocomplete="off" required />
    </div>

    <div class="field-row">
      <div class="field">
        <label for="cost">Amount (₹)</label>
        <input type="number" id="cost" name="cost" placeholder="0.00"
               min="0" step="0.01" required />
      </div>

      <div class="field">
        <label for="category">Category</label>
        <!-- Combo: pick from list or type new -->
        <input type="text" id="category" name="category" list="cat-list"
               placeholder="Food, Transport, Bills…" autocomplete="off" required />
        <datalist id="cat-list">
          {% for cat in categories %}
          <option value="{{ cat }}">
          {% endfor %}
          <!-- Sensible defaults if no history yet -->
          <option value="Food">
          <option value="Transport">
          <option value="Utilities">
          <option value="Entertainment">
          <option value="Health">
          <option value="Shopping">
          <option value="Education">
          <option value="Other">
        </datalist>
      </div>
    </div>

    <div class="form-actions">
      <a href="{{ url_for('expenses.dashboard') }}" class="btn btn--ghost">Cancel</a>
      <button type="submit" class="btn btn--primary">Save Expense →</button>
    </div>

  </form>
</div>
{% endblock %}
