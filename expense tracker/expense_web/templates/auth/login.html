{% extends 'base.html' %}
{% block title %}Sign In{% endblock %}

{% block auth_content %}
<div class="auth-card">
  <div class="auth-card__left">
    <div class="auth-deco">
      <span class="deco-brand">◈ Ledger</span>
      <p class="deco-tagline">Your personal<br/><em>expense story.</em></p>
      <div class="deco-circles">
        <div class="dc dc1"></div>
        <div class="dc dc2"></div>
        <div class="dc dc3"></div>
      </div>
    </div>
  </div>

  <div class="auth-card__right">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your account</p>

    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="your_username" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password"
                 placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" class="toggle-pw" aria-label="Show password">
            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn--primary btn--full">Sign in →</button>
    </form>

    <p class="auth-switch">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
